name: 01 - Steps Outputs Demo

on:
  workflow_dispatch:

jobs:
  deployment-job:
    outputs:
      deployment_url: ${{ steps.deploy.outputs.deployment_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Application
        id: deploy
        run: |
          echo " deploying application ..."
          sleep 3
          echo "deployment_url=https://manjot-demo.com" >> $GITHUB_OUTPUT

  notify-job:
    needs: deployment-job
    runs-on: ubuntu-latest
    steps:
      - name: Send Notification
        run: echo "${{ needs.deployment-job.outputs.deployment_url }}"
